<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Met Art Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Met Art Explorer</h1>
  <p>Search for artwork from The Met Museum API</p>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Enter a keyword" value="samurai">
    <button id="searchBtn">Search</button>
  </div>

  <div class="main-container">
    <div class="left-panel">
      <h2>Featured Artwork</h2>
      <p>Drag the card and release it to see Popmotion inertia.</p>

      <div id="dragArea">
        <div id="featuredCard">
          <img id="featuredImage" src="" alt="Artwork image">
          <div class="card-text">
            <h3 id="featuredTitle">Artwork title</h3>
            <p id="featuredArtist">Artist name</p>
            <p id="featuredDate">Date</p>
            <a id="featuredLink" href="#" target="_blank">View on Museum Site</a>
          </div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <h2>Project Info</h2>
      <p><strong>API:</strong> Met Museum API</p>
      <p><strong>Animation:</strong> Popmotion pointer() and inertia()</p>
      <p id="status">Status: Ready</p>
    </div>
  </div>

  <h2>Results</h2>
  <div id="results"></div>

  <script src="https://unpkg.com/popmotion/dist/popmotion.global.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
