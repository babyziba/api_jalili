<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Met Art Explorer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      margin: 20px;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .search-box {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 220px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
      margin-right: 8px;
    }

    .main {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    .left, .right {
      border: 1px solid #999;
      padding: 15px;
      background: #f9f9f9;
    }

    .left {
      flex: 2;
    }

    .right {
      flex: 1;
    }

    #animationArea {
      width: 100%;
      height: 460px;
      border: 1px dashed #888;
      position: relative;
      overflow: hidden;
      background: #eee;
      margin-top: 10px;
    }

    #featuredCard {
      width: 320px;
      position: absolute;
      left: 10px;
      top: 10px;
      background: white;
      border: 1px solid #666;
    }

    #featuredImage {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .card-text {
      padding: 10px;
    }

    .card-text h3 {
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    .card-text p {
      margin: 5px 0;
    }

    .card-text a {
      display: inline-block;
      margin-top: 10px;
      color: blue;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .result-card {
      border: 1px solid #999;
      background: #fafafa;
      padding: 10px;
    }

    .result-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #ddd;
      display: block;
    }

    .result-card h3 {
      font-size: 18px;
      margin: 10px 0 5px 0;
    }

    .result-card p {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <h1>Met Art Explorer</h1>
  <p>Search for artwork from The Met Museum API</p>

  <div class="search-box">
    <input type="text" id="searchInput" value="cat" placeholder="Enter keyword">
    <button id="searchBtn">Search</button>
    <button id="animateBtn">Animate Card</button>
    <button id="resetBtn">Reset Card</button>
  </div>

  <div class="main">
    <div class="left">
      <h2>Featured Artwork</h2>
      <p>This card uses Popmotion inertia animation.</p>

      <div id="animationArea">
        <div id="featuredCard">
          <img id="featuredImage" src="" alt="Artwork image">
          <div class="card-text">
            <h3 id="featuredTitle">Artwork title</h3>
            <p id="featuredArtist">Artist name</p>
            <p id="featuredDate">Date</p>
            <a id="featuredLink" href="#" target="_blank">View on Museum Site</a>
          </div>
        </div>
      </div>
    </div>

    <div class="right">
      <h2>Project Info</h2>
      <p><strong>API:</strong> Met Museum API</p>
      <p><strong>Animation:</strong> Popmotion inertia()</p>
      <p id="status">Status: Ready</p>
    </div>
  </div>

  <h2>Results</h2>
  <div id="results"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/popmotion/11.0.5/popmotion.min.js"></script>
  <script>
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const animateBtn = document.getElementById("animateBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resultsDiv = document.getElementById("results");
    const statusText = document.getElementById("status");

    const featuredImage = document.getElementById("featuredImage");
    const featuredTitle = document.getElementById("featuredTitle");
    const featuredArtist = document.getElementById("featuredArtist");
    const featuredDate = document.getElementById("featuredDate");
    const featuredLink = document.getElementById("featuredLink");

    const featuredCard = document.getElementById("featuredCard");
    const animationArea = document.getElementById("animationArea");

    let currentX = 0;
    let currentY = 0;
    let xAnimation = null;
    let yAnimation = null;

    searchBtn.addEventListener("click", function () {
      const keyword = searchInput.value.trim();
      if (keyword) {
        fetchArt(keyword);
      }
    });

    animateBtn.addEventListener("click", function () {
      runInertiaAnimation();
    });

    resetBtn.addEventListener("click", function () {
      stopAnimations();
      currentX = 0;
      currentY = 0;
      updateCardPosition();
    });

    async function fetchArt(keyword) {
      statusText.textContent = "Status: Loading...";

      try {
        const searchUrl =
          "https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&q=" +
          encodeURIComponent(keyword);

        const searchResponse = await fetch(searchUrl);
        const searchData = await searchResponse.json();

        if (!searchData.objectIDs || searchData.objectIDs.length === 0) {
          resultsDiv.innerHTML = "<p>No results found.</p>";
          statusText.textContent = "Status: No results found";
          return;
        }

        const ids = searchData.objectIDs.slice(0, 8);
        const artworks = [];

        for (let i = 0; i < ids.length; i++) {
          const objectUrl =
            "https://collectionapi.metmuseum.org/public/collection/v1/objects/" + ids[i];

          const objectResponse = await fetch(objectUrl);
          const objectData = await objectResponse.json();

          if (objectData.primaryImageSmall) {
            artworks.push(objectData);
          }
        }

        if (artworks.length === 0) {
          resultsDiv.innerHTML = "<p>No image results found.</p>";
          statusText.textContent = "Status: No images found";
          return;
        }

        showFeatured(artworks[0]);
        showResults(artworks);
        statusText.textContent = "Status: Loaded successfully";
      } catch (error) {
        console.log(error);
        resultsDiv.innerHTML = "<p>There was an error loading the API data.</p>";
        statusText.textContent = "Status: Error";
      }
    }

    function showFeatured(art) {
      featuredImage.src = art.primaryImageSmall || "";
      featuredTitle.textContent = art.title || "No title";
      featuredArtist.textContent = art.artistDisplayName || "Unknown artist";
      featuredDate.textContent = art.objectDate || "Unknown date";
      featuredLink.href = art.objectURL || "#";

      currentX = 0;
      currentY = 0;
      updateCardPosition();
    }

    function showResults(artworks) {
      resultsDiv.innerHTML = "";

      for (let i = 0; i < artworks.length; i++) {
        const art = artworks[i];

        const card = document.createElement("div");
        card.className = "result-card";

        card.innerHTML = `
          <img src="${art.primaryImageSmall}" alt="${art.title}">
          <h3>${art.title || "No title"}</h3>
          <p><strong>Artist:</strong> ${art.artistDisplayName || "Unknown"}</p>
          <p><strong>Date:</strong> ${art.objectDate || "Unknown"}</p>
          <a href="${art.objectURL}" target="_blank">Open</a>
        `;

        resultsDiv.appendChild(card);
      }
    }

    function updateCardPosition() {
      featuredCard.style.transform = "translate(" + currentX + "px, " + currentY + "px)";
    }

    function stopAnimations() {
      if (xAnimation) {
        xAnimation.stop();
        xAnimation = null;
      }

      if (yAnimation) {
        yAnimation.stop();
        yAnimation = null;
      }
    }

    function runInertiaAnimation() {
      if (!window.popmotion || !window.popmotion.inertia) {
        statusText.textContent = "Status: Popmotion failed to load";
        return;
      }

      stopAnimations();

      const areaRect = animationArea.getBoundingClientRect();
      const cardRect = featuredCard.getBoundingClientRect();

      const maxX = areaRect.width - cardRect.width - 20;
      const maxY = areaRect.height - cardRect.height - 20;

      const inertia = window.popmotion.inertia;

      xAnimation = inertia({
        from: 0,
        velocity: 250,
        min: 0,
        max: maxX,
        bounceStiffness: 120,
        bounceDamping: 10
      }).start(function (value) {
        currentX = value;
        updateCardPosition();
      });

      yAnimation = inertia({
        from: 0,
        velocity: 180,
        min: 0,
        max: maxY,
        bounceStiffness: 120,
        bounceDamping: 10
      }).start(function (value) {
        currentY = value;
        updateCardPosition();
      });

      statusText.textContent = "Status: Animation running";
    }

    fetchArt("cat");
  </script>
</body>
</html>
